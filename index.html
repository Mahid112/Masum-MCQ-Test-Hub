<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masum MCQ Test Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c; --gold-light: #e8c97a; --gold-dim: #8a6f30;
            --navy: #0a0e1a; --navy-mid: #111827; --navy-light: #1a2235;
            --text: #e8e0d0; --text-dim: #9090a0;
            --green: #2ecc71; --green-bg: rgba(46,204,113,0.12);
            --red: #e74c3c; --red-bg: rgba(231,76,60,0.12);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--navy);color:var(--text);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;overflow-x:hidden;}
        body::before{content:'';position:fixed;inset:0;
            background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(201,168,76,0.08) 0%,transparent 60%),
            repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(201,168,76,0.025) 60px,rgba(201,168,76,0.025) 61px),
            repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(201,168,76,0.025) 60px,rgba(201,168,76,0.025) 61px);
            pointer-events:none;z-index:0;}
        
        /* CREDIT */
        .credit{position:fixed;top:14px;right:18px;font-family:'Cinzel',serif;font-size:0.7rem;color:var(--gold-dim);letter-spacing:2px;text-transform:uppercase;z-index:300;opacity:0.85;}
        
        header{background:linear-gradient(to bottom,rgba(11,16,28,0.95),rgba(10,14,26,0.85));border-bottom:1px solid var(--gold-dim);padding:25px 20px;text-align:center;position:relative;z-index:10;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
        h1{font-family:'Cinzel',serif;font-weight:900;font-size:2.2rem;color:var(--gold);letter-spacing:3px;text-shadow:0 2px 10px rgba(201,168,76,0.2);margin-bottom:6px;}
        .subtitle{font-size:1rem;color:var(--text-dim);font-style:italic;letter-spacing:1px;}
        
        .container{max-width:850px;margin:40px auto;padding:0 20px;position:relative;z-index:10;}
        
        /* HUB VIEW */
        .hub-grid{display:grid;grid-template-columns:1fr;gap:20px;}
        .subject-card{background:var(--navy-light);border:1px solid rgba(201,168,76,0.15);border-radius:6px;padding:30px;cursor:pointer;transition:all 0.4s cubic-bezier(0.16,1,0.3,1);position:relative;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.25);}
        .subject-card::before{content:'';position:absolute;left:0;top:0;height:100%;width:4px;background:var(--gold);transform:scaleY(0.3);transition:transform 0.4s ease;transform-origin:center;}
        .subject-card:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 15px 35px rgba(201,168,76,0.1);}
        .subject-card:hover::before{transform:scaleY(1);}
        .subject-title{font-family:'Cinzel',serif;font-size:1.4rem;color:var(--gold-light);margin-bottom:8px;letter-spacing:1px;}
        .subject-meta{font-size:0.95rem;color:var(--text-dim);}
        
        /* QUIZ VIEW */
        .quiz-view, .result-view{display:none;background:var(--navy-light);border:1px solid rgba(201,168,76,0.2);border-radius:8px;padding:40px;box-shadow:0 15px 40px rgba(0,0,0,0.3);position:relative;}
        
        .quiz-header{display:flex;justify-content:between;align-items:center;border-bottom:1px solid rgba(201,168,76,0.1);padding-bottom:15px;margin-bottom:30px;}
        .q-progress{font-family:'Cinzel',serif;font-size:0.95rem;color:var(--gold);letter-spacing:1px;}
        .back-btn{background:transparent;border:1px solid var(--gold-dim);color:var(--gold);padding:6px 16px;font-family:'Cinzel',serif;font-size:0.8rem;letter-spacing:1px;cursor:pointer;border-radius:4px;transition:all 0.3s;}
        .back-btn:hover{background:var(--gold);color:var(--navy);border-color:var(--gold);}
        
        .question-text{font-size:1.45rem;line-height:1.5;margin-bottom:30px;color:var(--text);font-weight:400;}
        
        .options-list{display:flex;flex-direction:column;gap:14px;margin-bottom:35px;}
        .option-item{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08);border-radius:5px;padding:16px 20px;font-size:1.15rem;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;gap:15px;}
        .option-item:hover{background:rgba(201,168,76,0.05);border-color:rgba(201,168,76,0.4);transform:translateX(4px);}
        .opt-key{font-family:'Cinzel',serif;font-size:0.95rem;color:var(--gold);width:25px;height:25px;border:1px solid var(--gold-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .option-item:hover .opt-key{background:var(--gold);color:var(--navy);border-color:var(--gold);}
        
        /* STATE STYLES */
        .option-item.correct{background:var(--green-bg);border-color:var(--green);color:#fff;}
        .option-item.correct .opt-key{background:var(--green);border-color:var(--green);color:#fff;}
        .option-item.wrong{background:var(--red-bg);border-color:var(--red);color:#fff;}
        .option-item.wrong .opt-key{background:var(--red);border-color:var(--red);color:#fff;}
        .option-item.disabled{pointer-events:none;}
        
        .action-container{display:flex;justify-content:flex-end;}
        .next-btn{background:var(--gold);color:var(--navy);border:none;padding:12px 30px;font-family:'Cinzel',serif;font-size:0.95rem;font-weight:600;letter-spacing:1px;cursor:pointer;border-radius:4px;transition:all 0.3s;display:none;box-shadow:0 4px 15px rgba(201,168,76,0.25);}
        .next-btn:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,168,76,0.4);}
        
        /* RESULT VIEW */
        .result-title{font-family:'Cinzel',serif;font-size:2.2rem;color:var(--gold);text-align:center;margin-bottom:15px;letter-spacing:2px;}
        .result-score{text-align:center;font-size:4rem;font-weight:300;color:#fff;margin-bottom:35px;font-family:'Cinzel',serif;}
        .result-score span{color:var(--gold-light);font-weight:600;}
        
        .review-section{margin-top:40px;border-top:1px solid rgba(201,168,76,0.15);padding-top:30px;}
        .review-heading{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--gold);margin-bottom:25px;letter-spacing:1px;}
        .review-item{background:rgba(0,0,0,0.15);border-left:3px solid var(--gold-dim);padding:20px;margin-bottom:18px;border-radius:0 4px 4px 0;}
        .review-q{font-size:1.2rem;margin-bottom:12px;font-weight:600;}
        .review-ans-line{font-size:1.05rem;display:flex;gap:20px;color:var(--text-dim);}
        .text-correct{color:var(--green);font-weight:600;}
        .text-wrong{color:var(--red);font-weight:600;}
        
        @media(max-width:600px){
            h1{font-size:1.7rem;}
            .quiz-view, .result-view{padding:25px 20px;}
            .question-text{font-size:1.25rem;}
            .option-item{font-size:1.05rem;padding:14px 16px;}
        }
    </style>
</head>
<body>

    <div class="credit">M. B. Z.</div>

    <header>
        <h1>Masum MCQ Test Hub</h1>
        <div class="subtitle">Jurisprudence & Legal Legacy Evaluation System</div>
    </header>

    <div class="container">
        <!-- HUB VIEW -->
        <div id="hub-view" class="hub-grid">
            <div class="subject-card" onclick="startQuiz('legal_history')">
                <div class="subject-title">Legal History of Bangladesh</div>
                <div class="subject-meta">Comprehensive review of legal evolution and historical milestones.</div>
            </div>
        </div>

        <!-- QUIZ VIEW -->
        <div id="quiz-view" class="quiz-view">
            <div class="quiz-header">
                <div id="q-progress" class="q-progress">QUESTION 1 OF 10</div>
                <button class="back-btn" onclick="showHub()">Exit Hub</button>
            </div>
            <div id="question-text" class="question-text"></div>
            <div id="options-list" class="options-list"></div>
            <div class="action-container">
                <button id="next-btn" class="next-btn" onclick="nextQuestion()">Next Question</button>
            </div>
        </div>

        <!-- RESULT VIEW -->
        <div id="result-view" class="result-view">
            <div class="result-title">Evaluation Complete</div>
            <div id="result-score" class="result-score">0 / 0</div>
            <div style="text-align:center; margin-bottom:40px;">
                <button class="back-btn" style="padding:10px 25px;" onclick="showHub()">Return to Hub</button>
            </div>
            <div class="review-section">
                <div class="review-heading">Performance Audit</div>
                <div id="review-container"></div>
            </div>
        </div>
    </div>

    <script>
        const DB = {
          legal_history: [
            {"q": "Which of the following jurisdiction is NOT constitutional jurisdiction for the Appellate Division of the Supreme Court?", "options": [{"key": "A", "text": "Appellate"}, {"key": "B", "text": "Writ"}, {"key": "C", "text": "Advisory"}, {"key": "D", "text": "Issue and execution of process"}, {"key": "E", "text": "Review"}], "answer": "B"}, 
            {"q": "Under which article of Bangladesh Constitution states that the HCD shall have permanence and control over all subordinate courts?", "options": [{"key": "A", "text": "107"}, {"key": "B", "text": "108"}, {"key": "C", "text": "109"}, {"key": "D", "text": "110"}, {"key": "E", "text": "112"}], "answer": "C"}, 
            {"q": "Under which Article of Bangladesh Constitution empowers the Appellate Division to review its own judgment?", "options": [{"key": "A", "text": "105"}, {"key": "B", "text": "106"}, {"key": "C", "text": "107"}, {"key": "D", "text": "108"}, {"key": "E", "text": "109"}], "answer": "A"}, 
            {"q": "From which legal system the term “Justice of the Peace” has originated?", "options": [{"key": "A", "text": "UK"}, {"key": "B", "text": "USA"}, {"key": "C", "text": "Middle East"}, {"key": "D", "text": "Australian"}, {"key": "E", "text": "French"}], "answer": "A"}, 
            {"q": "Appeal against conviction under section 124A of Penal Code lies to—", "options": [{"key": "A", "text": "CMM"}, {"key": "B", "text": "Additional Sessions Judge"}, {"key": "C", "text": "Sessions Judge"}, {"key": "D", "text": "High Court Division"}, {"key": "E", "text": "Appellate Division"}], "answer": "D"}, 
            {"q": "Classification of Subordinate Civil Courts is done according to—", "options": [{"key": "A", "text": "Criminal Procedure Code"}, {"key": "B", "text": "Civil Procedure Code"}, {"key": "C", "text": "Penal Code"}, {"key": "D", "text": "Civil Courts Act"}, {"key": "E", "text": "Criminal Courts Act"}], "answer": "D"}, 
            {"q": "The Appellate Court disposes appeal considering—", "options": [{"key": "A", "text": "Only law"}, {"key": "B", "text": "Only fact"}, {"key": "C", "text": "Both law and fact"}, {"key": "D", "text": "Matter of law"}, {"key": "E", "text": "Matter of fact"}], "answer": "C"}, 
            {"q": "When a person illegally holds public office, writ issued is—", "options": [{"key": "A", "text": "Mandamus"}, {"key": "B", "text": "Certiorari"}, {"key": "C", "text": "Quo warranto"}, {"key": "D", "text": "Prohibition"}, {"key": "E", "text": "Habeas corpus"}], "answer": "C"}, 
            {"q": "Who is chairman of National Legal Aid Organisation?", "options": [{"key": "A", "text": "Vice Chairman Bar Council"}, {"key": "B", "text": "Law Secretary"}, {"key": "C", "text": "Law Minister"}, {"key": "D", "text": "Chief Justice"}, {"key": "E", "text": "Attorney General"}], "answer": "D"}, 
            {"q": "Pecuniary jurisdiction of Assistant District Judge is up to—", "options": [{"key": "A", "text": "10 lac"}, {"key": "B", "text": "20 lac"}, {"key": "C", "text": "30 lac"}, {"key": "D", "text": "25 lac"}, {"key": "E", "text": "15 lac"}], "answer": "D"}, 
            {"q": "Which jurisdiction is NOT ordinary jurisdiction of High Court Division?", "options": [{"key": "A", "text": "Appellate"}, {"key": "B", "text": "Writ"}, {"key": "C", "text": "Reference"}, {"key": "D", "text": "Revisional"}, {"key": "E", "text": "Review"}], "answer": "B"}, 
            {"q": "Under which article HCD may transfer a case from subordinate court?", "options": [{"key": "A", "text": "107"}, {"key": "B", "text": "108"}, {"key": "C", "text": "109"}, {"key": "D", "text": "110"}, {"key": "E", "text": "112"}], "answer": "D"}, 
            {"q": "Appellate Division review power under which Article?", "options": [{"key": "A", "text": "105"}, {"key": "B", "text": "106"}, {"key": "C", "text": "107"}, {"key": "D", "text": "108"}, {"key": "E", "text": "109"}], "answer": "A"}, 
            {"q": "Origin of “Justice of the Peace”?", "options": [{"key": "A", "text": "UK"}, {"key": "B", "text": "USA"}, {"key": "C", "text": "Middle East"}, {"key": "D", "text": "Australian"}, {"key": "E", "text": "French"}], "answer": "A"}, 
            {"q": "Pecuniary jurisdiction of Joint District Judge Court—", "options": [{"key": "A", "text": "10 lac"}, {"key": "B", "text": "20 lac"}, {"key": "C", "text": "30 lac"}, {"key": "D", "text": "25 lac"}, {"key": "E", "text": "Unlimited"}], "answer": "E"}, 
            {"q": "Appeal from CJM 7 years sentence lies to—", "options": [{"key": "A", "text": "District Judge"}, {"key": "B", "text": "Sessions Court"}, {"key": "C", "text": "Additional Sessions"}, {"key": "D", "text": "High Court Division"}, {"key": "E", "text": "Appellate Division"}], "answer": "B"}, 
            {"q": "What is Bail?", "options": [{"key": "A", "text": "Compensation"}, {"key": "B", "text": "Release pending trial"}, {"key": "C", "text": "Fine"}, {"key": "D", "text": "Rehabilitation"}, {"key": "E", "text": "Probation"}], "answer": "B"}, 
            {"q": "Illegal holding office → which writ?", "options": [{"key": "A", "text": "Mandamus"}, {"key": "B", "text": "Certiorari"}, {"key": "C", "text": "Quo warranto"}, {"key": "D", "text": "Prohibition"}, {"key": "E", "text": "Habeas corpus"}], "answer": "C"}, 
            {"q": "Judicial proceeding means—", "options": [{"key": "A", "text": "Investigation"}, {"key": "B", "text": "Inquiry + Investigation"}, {"key": "C", "text": "Inquiry + Trial"}, {"key": "D", "text": "Trial + Investigation"}, {"key": "E", "text": "Trial"}], "answer": "C"}, 
            {"q": "No appeal if fine not exceeding—", "options": [{"key": "A", "text": "100"}, {"key": "B", "text": "200"}, {"key": "C", "text": "300"}, {"key": "D", "text": "400"}, {"key": "E", "text": "500"}], "answer": "E"}, 
            {"q": "Which is NOT constitutional jurisdiction of Appellate Division?", "options": [{"key": "A", "text": "Appellate"}, {"key": "B", "text": "Writ"}, {"key": "C", "text": "Advisory"}, {"key": "D", "text": "Execution"}, {"key": "E", "text": "Review"}], "answer": "B"}, 
            {"q": "Final court of appeal during British India—", "options": [{"key": "A", "text": "Federal Court"}, {"key": "B", "text": "House of Commons"}, {"key": "C", "text": "Privy Council"}, {"key": "D", "text": "House of Lords"}, {"key": "E", "text": "Supreme Court"}], "answer": "C"}, 
            {"q": "Classification of Criminal Courts under CrPC section—", "options": [{"key": "A", "text": "6"}, {"key": "B", "text": "7"}, {"key": "C", "text": "8"}, {"key": "D", "text": "9"}, {"key": "E", "text": "10"}], "answer": "A"}, 
            {"q": "Pecuniary jurisdiction Senior Assistant Judge—", "options": [{"key": "A", "text": "10 lac"}, {"key": "B", "text": "20 lac"}, {"key": "C", "text": "30 lac"}, {"key": "D", "text": "25 lac"}, {"key": "E", "text": "5 crore"}], "answer": "D"}, 
            {"q": "Fine by Magistrate (limit)", "options": [{"key": "A", "text": "1 lac"}, {"key": "B", "text": "2 lac"}, {"key": "C", "text": "3 lac"}, {"key": "D", "text": "4 lac"}, {"key": "E", "text": "5 lac"}], "answer": "E"}, 
            {"q": "Bail means—", "options": [{"key": "A", "text": "Compensation"}, {"key": "B", "text": "Release pending trial"}, {"key": "C", "text": "Fine"}, {"key": "D", "text": "Rehab"}, {"key": "E", "text": "Probation"}], "answer": "B"}, 
            {"q": "Illegal office holding → writ?", "options": [{"key": "A", "text": "Mandamus"}, {"key": "B", "text": "Certiorari"}, {"key": "C", "text": "Quo warranto"}, {"key": "D", "text": "Prohibition"}, {"key": "E", "text": "Habeas corpus"}], "answer": "C"}, 
            {"q": "Who is NOT eligible for legal aid?", "options": [{"key": "A", "text": "Old age beneficiary"}, {"key": "B", "text": "VGD holder"}, {"key": "C", "text": "Poor widow"}, {"key": "D", "text": "Poor person"}, {"key": "E", "text": "Any woman"}], "answer": "E"}, 
            {"q": "The Supreme Court of Bangladesh consists of—", "options": [{"key": "A", "text": "One Division"}, {"key": "B", "text": "Two Divisions"}, {"key": "C", "text": "Three Divisions"}, {"key": "D", "text": "Four Divisions"}], "answer": "B"}, 
            {"q": "Which are the two divisions of the Supreme Court?", "options": [{"key": "A", "text": "Civil & Criminal Division"}, {"key": "B", "text": "Constitutional & Criminal Division"}, {"key": "C", "text": "High Court Division & Appellate Division"}, {"key": "D", "text": "District Court & High Court Division"}], "answer": "C"}, 
            {"q": "Writ Jurisdiction is exercised under—", "options": [{"key": "A", "text": "Article 101"}, {"key": "B", "text": "Article 102"}, {"key": "C", "text": "Article 103"}, {"key": "D", "text": "Article 109"}], "answer": "B"}, 
            {"q": "Supervisory Jurisdiction of the High Court Division is provided under—", "options": [{"key": "A", "text": "Article 102"}, {"key": "B", "text": "Article 103"}, {"key": "C", "text": "Article 109"}, {"key": "D", "text": "Article 110"}], "answer": "C"}, 
            {"q": "Transfer of Cases by the High Court Division is governed by—", "options": [{"key": "A", "text": "Article 102"}, {"key": "B", "text": "Article 103"}, {"key": "C", "text": "Article 109"}, {"key": "D", "text": "Article 110"}], "answer": "D"}, 
            {"q": "Constitutional Appellate Jurisdiction of the Appellate Division is exercised under—", "options": [{"key": "A", "text": "Article 102"}, {"key": "B", "text": "Article 103"}, {"key": "C", "text": "Article 109"}, {"key": "D", "text": "Article 110"}], "answer": "B"}, 
            {"q": "Which Writ protects personal liberty?", "options": [{"key": "A", "text": "Certiorari"}, {"key": "B", "text": "Mandamus"}, {"key": "C", "text": "Habeas Corpus"}, {"key": "D", "text": "Quo Warranto"}], "answer": "C"}, 
            {"q": "Habeas Corpus means—", "options": [{"key": "A", "text": "We Command"}, {"key": "B", "text": "Produce the Body"}, {"key": "C", "text": "By What Authority"}, {"key": "D", "text": "To Prohibit"}], "answer": "B"}, 
            {"q": "Mandamus means—", "options": [{"key": "A", "text": "Produce the Body"}, {"key": "B", "text": "To Be Certified"}, {"key": "C", "text": "We Command"}, {"key": "D", "text": "By What Authority"}], "answer": "C"}, 
            {"q": "Quo Warranto means—", "options": [{"key": "A", "text": "We Command"}, {"key": "B", "text": "Produce the Body"}, {"key": "C", "text": "By What Authority"}, {"key": "D", "text": "To Prohibit"}], "answer": "C"}, 
            {"q": "Which Writ is issued before a decision is made?", "options": [{"key": "A", "text": "Certiorari"}, {"key": "B", "text": "Prohibition"}, {"key": "C", "text": "Mandamus"}, {"key": "D", "text": "Habeas Corpus"}], "answer": "B"}, 
            {"q": "Which Writ is issued after a decision is made?", "options": [{"key": "A", "text": "Certiorari"}, {"key": "B", "text": "Prohibition"}, {"key": "C", "text": "Habeas Corpus"}, {"key": "D", "text": "Mandamus"}], "answer": "A"}, 
            {"q": "Judicial Review is mainly exercised by—", "options": [{"key": "A", "text": "Parliament"}, {"key": "B", "text": "President"}, {"key": "C", "text": "High Court Division"}, {"key": "D", "text": "District Court"}], "answer": "C"}, 
            {"q": "Bangladesh follows—", "options": [{"key": "A", "text": "Presidential Government"}, {"key": "B", "text": "Parliamentary Government"}, {"key": "C", "text": "Federal Government"}, {"key": "D", "text": "Military Government"}], "answer": "B"}, 
            {"q": "The highest court of Bangladesh is—", "options": [{"key": "A", "text": "High Court Division"}, {"key": "B", "text": "Appellate Division"}, {"key": "C", "text": "Supreme Court"}, {"key": "D", "text": "District Court"}], "answer": "C"}, 
            {"q": "A GR Case starts with—", "options": [{"key": "A", "text": "Complaint"}, {"key": "B", "text": "FIR"}, {"key": "C", "text": "Petition"}, {"key": "D", "text": "Charge Sheet"}], "answer": "B"}, 
            {"q": "A CR Case starts with—", "options": [{"key": "A", "text": "FIR"}, {"key": "B", "text": "Complaint"}, {"key": "C", "text": "Charge Sheet"}, {"key": "D", "text": "Final Report"}], "answer": "B"}, 
            {"q": "FIR is recorded under Section—", "options": [{"key": "A", "text": "154"}, {"key": "B", "text": "173"}, {"key": "C", "text": "190"}, {"key": "D", "text": "204"}], "answer": "A"}, 
            {"q": "Charge Sheet is submitted under Section—", "options": [{"key": "A", "text": "154"}, {"key": "B", "text": "173"}, {"key": "C", "text": "190"}, {"key": "D", "text": "204"}], "answer": "B"}, 
            {"q": "Cognizance is generally taken under Section—", "options": [{"key": "A", "text": "154"}, {"key": "B", "text": "173"}, {"key": "C", "text": "190"}, {"key": "D", "text": "204"}], "answer": "C"}, 
            {"q": "Issue of Process is governed by Section—", "options": [{"key": "A", "text": "154"}, {"key": "B", "text": "173"}, {"key": "C", "text": "190"}, {"key": "D", "text": "204"}], "answer": "D"}, 
            {"q": "Examination of accused is made under Section—", "options": [{"key": "A", "text": "342"}, {"key": "B", "text": "173"}, {"key": "C", "text": "190"}, {"key": "D", "text": "154"}], "answer": "A"}, 
            {"q": "Naraji Petition is filed against—", "options": [{"key": "A", "text": "FIR"}, {"key": "B", "text": "Charge Sheet"}, {"key": "C", "text": "Final Report"}, {"key": "D", "text": "Cognizance"}], "answer": "C"}, 
            {"q": "ADR stands for—", "options": [{"key": "A", "text": "Administrative Dispute Resolution"}, {"key": "B", "text": "Alternative Dispute Resolution"}, {"key": "C", "text": "Alternative Departmental Review"}, {"key": "D", "text": "Administrative Duty Rule"}], "answer": "B"}, 
            {"q": "The first stage of a civil suit is—", "options": [{"key": "A", "text": "Summons"}, {"key": "B", "text": "Written Statement"}, {"key": "C", "text": "Plaint"}, {"key": "D", "text": "Judgment"}], "answer": "C"}, 
            {"q": "The head of the judiciary of Bangladesh is—", "options": [{"key": "A", "text": "President"}, {"key": "B", "text": "Attorney General"}, {"key": "C", "text": "Chief Justice"}, {"key": "D", "text": "Law Minister"}], "answer": "C"}, 
            {"q": "The Appellate Division is headed by—", "options": [{"key": "A", "text": "Attorney General"}, {"key": "B", "text": "Chief Justice"}, {"key": "C", "text": "President"}, {"key": "D", "text": "Speaker"}], "answer": "B"}, 
            {"q": "The High Court Division is a part of—", "options": [{"key": "A", "text": "District Court"}, {"key": "B", "text": "Supreme Court"}, {"key": "C", "text": "Sessions Court"}, {"key": "D", "text": "Civil Court"}], "answer": "B"}, 
            {"q": "Article 22 of the Constitution deals with—", "options": [{"key": "A", "text": "Fundamental Rights"}, {"key": "B", "text": "Writ Jurisdiction"}, {"key": "C", "text": "Separation of Judiciary"}, {"key": "D", "text": "Local Government"}], "answer": "C"}, 
            {"q": "The highest civil court below the Supreme Court is—", "options": [{"key": "A", "text": "Joint District Judge Court"}, {"key": "B", "text": "District Judge Court"}, {"key": "C", "text": "Assistant Judge Court"}, {"key": "D", "text": "Sessions Court"}], "answer": "B"}, 
            {"q": "The highest criminal court in a district is—", "options": [{"key": "A", "text": "Chief Judicial Magistrate Court"}, {"key": "B", "text": "Sessions Judge Court"}, {"key": "C", "text": "Assistant Sessions Judge Court"}, {"key": "D", "text": "Metropolitan Magistrate Court"}], "answer": "B"}, 
            {"q": "Civil courts mainly deal with—", "options": [{"key": "A", "text": "Public offences"}, {"key": "B", "text": "Disputes between private parties"}, {"key": "C", "text": "State offences"}, {"key": "D", "text": "Constitutional offences"}], "answer": "B"}, 
            {"q": "Criminal courts mainly deal with—", "options": [{"key": "A", "text": "Property disputes"}, {"key": "B", "text": "Contract disputes"}, {"key": "C", "text": "Offences against law"}, {"key": "D", "text": "Family disputes"}], "answer": "C"}, 
            {"q": "Which court hears appeals from Assistant Judge Court?", "options": [{"key": "A", "text": "Supreme Court"}, {"key": "B", "text": "High Court Division"}, {"key": "C", "text": "District Judge Court"}, {"key": "D", "text": "Sessions Court"}], "answer": "C"}, 
            {"q": "A Sessions Judge mainly deals with—", "options": [{"key": "A", "text": "Civil Cases"}, {"key": "B", "text": "Criminal Cases"}, {"key": "C", "text": "Constitutional Cases"}, {"key": "D", "text": "Writ Cases"}], "answer": "B"}, 
            {"q": "Which of the following is NOT a civil court?", "options": [{"key": "A", "text": "Assistant Judge Court"}, {"key": "B", "text": "Joint District Judge Court"}, {"key": "C", "text": "District Judge Court"}, {"key": "D", "text": "Chief Judicial Magistrate Court"}], "answer": "D"}, 
            {"q": "Which of the following is NOT a criminal court?", "options": [{"key": "A", "text": "Sessions Judge Court"}, {"key": "B", "text": "Chief Judicial Magistrate Court"}, {"key": "C", "text": "Joint District Judge Court"}, {"key": "D", "text": "Metropolitan Magistrate Court"}], "answer": "C"}, 
            {"q": "Territorial Jurisdiction refers to—", "options": [{"key": "A", "text": "Monetary limit"}, {"key": "B", "text": "Geographical area"}, {"key": "C", "text": "Subject matter"}, {"key": "D", "text": "Appellate power"}], "answer": "B"}, 
            {"q": "Pecuniary Jurisdiction refers to—", "options": [{"key": "A", "text": "Criminal jurisdiction"}, {"key": "B", "text": "Geographical jurisdiction"}, {"key": "C", "text": "Monetary jurisdiction"}, {"key": "D", "text": "Constitutional jurisdiction"}], "answer": "C"}, 
            {"q": "Written Statement is filed by—", "options": [{"key": "A", "text": "Plaintiff"}, {"key": "B", "text": "Judge"}, {"key": "C", "text": "Defendant"}, {"key": "D", "text": "Magistrate"}], "answer": "C"}, 
            {"q": "Plaint is filed by—", "options": [{"key": "A", "text": "Defendant"}, {"key": "B", "text": "Plaintiff"}, {"key": "C", "text": "Witness"}, {"key": "D", "text": "Magistrate"}], "answer": "B"}, 
            {"q": "Summons is issued to—", "options": [{"key": "A", "text": "Notify a party to appear before court"}, {"key": "B", "text": "Arrest a person"}, {"key": "C", "text": "Convict an accused"}, {"key": "D", "text": "Release an accused"}], "answer": "A"}, 
            {"q": "Judgment is delivered by—", "options": [{"key": "A", "text": "Witness"}, {"key": "B", "text": "Police"}, {"key": "C", "text": "Court"}, {"key": "D", "text": "Lawyer"}], "answer": "C"}, 
            {"q": "Decree is prepared after—", "options": [{"key": "A", "text": "Charge Sheet"}, {"key": "B", "text": "Judgment"}, {"key": "C", "text": "FIR"}, {"key": "D", "text": "Investigation"}], "answer": "B"}, 
            {"q": "Judicial Magistrate First Class may impose fine up to—", "options": [{"key": "A", "text": "Tk. 2,000"}, {"key": "B", "text": "Tk. 5,000"}, {"key": "C", "text": "Tk. 10,000"}, {"key": "D", "text": "Tk. 5,00,000 (5 Lac)"}], "answer": "D"}, 
            {"q": "Judicial Magistrate Second Class may impose fine up to—", "options": [{"key": "A", "text": "Tk. 2,000"}, {"key": "B", "text": "Tk. 5,000"}, {"key": "C", "text": "Tk. 10,000"}, {"key": "D", "text": "Tk. 3,00,000 (3 Lac)"}], "answer": "D"}, 
            {"q": "Judicial Magistrate Third Class may impose fine up to—", "options": [{"key": "A", "text": "Tk. 2,000"}, {"key": "B", "text": "Tk. 5,000"}, {"key": "C", "text": "Tk. 10,000"}, {"key": "D", "text": "Tk. 2,00,000 (2 Lac)"}], "answer": "D"}
          ]
        };

        let currentSubject = '';
        let currentQuestions = [];
        let currentQIndex = 0;
        let score = 0;
        let userAnswers = [];

        function startQuiz(subject) {
            currentSubject = subject;
            // Shuffle and pick 10 questions
            const shuffled = [...DB[subject]].sort(() => 0.5 - Math.random());
            currentQuestions = shuffled.slice(0, 10);
            currentQIndex = 0;
            score = 0;
            userAnswers = [];
            
            document.getElementById('hub-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'none';
            document.getElementById('quiz-view').style.display = 'block';
            
            showQuestion();
        }

        function showHub() {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'none';
            document.getElementById('hub-view').style.display = 'grid';
        }

        function showQuestion() {
            const qData = currentQuestions[currentQIndex];
            document.getElementById('q-progress').innerText = `QUESTION ${currentQIndex + 1} OF 10`;
            document.getElementById('question-text').innerText = qData.q;
            
            const optionsList = document.getElementById('options-list');
            optionsList.innerHTML = '';
            document.getElementById('next-btn').style.display = 'none';
            
            qData.options.forEach(opt => {
                const optItem = document.createElement('div');
                optItem.className = 'option-item';
                optItem.innerHTML = `<div class="opt-key">${opt.key}</div><div>${opt.text}</div>`;
                optItem.onclick = () => selectOption(optItem, opt.key);
                optionsList.appendChild(optItem);
            });
        }

        function selectOption(selectedItem, selectedKey) {
            const qData = currentQuestions[currentQIndex];
            const items = document.querySelectorAll('.option-item');
            
            items.forEach(item => item.classList.add('disabled'));
            
            userAnswers.push({
                q: qData.q,
                selected: selectedKey,
                correct: qData.answer,
                options: qData.options
            });

            if (selectedKey === qData.answer) {
                selectedItem.classList.add('correct');
                score++;
            } else {
                selectedItem.classList.add('wrong');
                items.forEach(item => {
                    const keyDiv = item.querySelector('.opt-key');
                    if (keyDiv && keyDiv.innerText === qData.answer) {
                        item.classList.add('correct');
                    }
                });
            }
            
            document.getElementById('next-btn').style.display = 'block';
        }

        function nextQuestion() {
            currentQIndex++;
            if (currentQIndex < 10) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
            
            document.getElementById('result-score').innerHTML = `<span>${score}</span> / 10`;
            
            const container = document.getElementById('review-container');
            container.innerHTML = '';
            
            userAnswers.forEach((ans, idx) => {
                const item = document.createElement('div');
                item.className = 'review-item';
                
                const selectText = ans.options.find(o => o.key === ans.selected)?.text || 'Unanswered';
                const correctText = ans.options.find(o => o.key === ans.correct).text;
                
                item.innerHTML = `
                    <div class="review-q">${idx + 1}. ${ans.q}</div>
                    <div class="review-ans-line">
                        <span>Your Answer: <span class="${ans.selected === ans.correct ? 'text-correct' : 'text-wrong'}">${ans.selected} - ${selectText}</span></span>
                        ${ans.selected !== ans.correct ? `<span>Correct: <span class="text-correct">${ans.correct} - ${correctText}</span></span>` : ''}
                    </div>
                `;
                container.appendChild(item);
            });
        }
    </script>
